<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduverse Admin Portal</title>
    <style>
        :root {
            /* Colors */
            --primary: #0D9488;
            /* Teal 600 */
            --primary-dark: #0F766E;
            --primary-light: #F0FDFA;
            --secondary: #64748B;
            --text-main: #1E293B;
            --text-sub: #94A3B8;
            --bg-body: #F1F5F9;
            --bg-card: #FFFFFF;
            --border: #E2E8F0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --danger: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            transition: transform 0.3s ease;
            z-index: 50;
        }

        .sidebar-header {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--primary);
            font-weight: 700;
            font-size: 1.25rem;
        }

        .nav-links {
            list-style: none;
            padding: 1.5rem 1rem;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--secondary);
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: var(--primary-light);
            color: var(--primary);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            transition: margin-left 0.3s ease;
            width: 100%;
        }

        /* Header */
        .top-header {
            height: 64px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 40;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--secondary);
        }

        .search-bar {
            position: relative;
            width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
            width: 16px;
        }

        .user-menu {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            width: 180px;
            box-shadow: var(--shadow);
            display: none;
        }

        .dropdown.show {
            display: block;
        }

        .dropdown-item {
            display: block;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .dropdown-item:hover {
            background: var(--bg-body);
        }

        /* Dashboard */
        .container {
            padding: 2rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .stat-icon {
            padding: 0.5rem;
            border-radius: 0.5rem;
        }

        .stat-value {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-sub);
        }

        .stat-trend {
            font-size: 0.875rem;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        .trend-up {
            color: var(--success);
        }

        .trend-down {
            color: var(--danger);
        }

        /* Chart Section */
        .card {
            background: var(--bg-card);
            border-radius: 1rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* SVG Chart */
        .chart-container {
            height: 300px;
            width: 100%;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .chart-line {
            fill: none;
            stroke: var(--primary);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .chart-area {
            fill: var(--primary-light);
            opacity: 0.5;
        }

        .chart-dot {
            fill: var(--bg-card);
            stroke: var(--primary);
            stroke-width: 2;
            r: 4;
            transition: r 0.2s;
            cursor: pointer;
        }

        .chart-dot:hover {
            r: 6;
        }

        .chart-tooltip {
            position: absolute;
            background: #1e293b;
            color: white;
            padding: 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        /* Table */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem 1.5rem;
            font-size: 0.75rem;
            color: var(--text-sub);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            background: var(--bg-body);
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--bg-body);
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-active {
            background: #DCFCE7;
            color: #15803D;
        }

        .badge-pending {
            background: #FEF3C7;
            color: #B45309;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 0;
            }

            .sidebar.active {
                transform: translateX(0);
                width: 260px;
            }

            .main-content {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }

            .search-bar {
                display: none;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            Eduverse
        </div>
        <ul class="nav-links">
            <li class="nav-item">
                <a href="#" class="nav-link active">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                        </path>
                    </svg>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                        </path>
                    </svg>
                    Users
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                        </path>
                    </svg>
                    Analytics
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                        </path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                    Settings
                </a>
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="menu-toggle" id="menuToggle">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div class="search-bar">
                    <span class="search-icon">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </span>
                    <input type="text" class="search-input" placeholder="Search...">
                </div>
            </div>

            <div class="user-menu" id="userMenu">
                <div style="text-align: right; display: none; margin-right: 0.5rem;" id="userName">
                    <div style="font-weight: 500; font-size: 0.875rem;">Admin User</div>
                    <div style="font-size: 0.75rem; color: var(--text-sub);">Administrator</div>
                </div>
                <div class="avatar">A</div>
                <div class="dropdown" id="dropdown">
                    <a href="#" class="dropdown-item">Profile</a>
                    <a href="#" class="dropdown-item">Settings</a>
                    <div style="border-top: 1px solid var(--border); margin: 0.5rem 0;"></div>
                    <a href="#" class="dropdown-item" style="color: var(--danger);">Logout</a>
                </div>
            </div>
        </header>

        <!-- Dashboard Content -->
        <div class="container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: var(--primary-light); color: var(--primary);">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                                </path>
                            </svg>
                        </div>
                    </div>
                    <div class="stat-value">2,543</div>
                    <div class="stat-label">Total Users</div>
                    <div class="stat-trend trend-up">↑ 12.5% this month</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: #e0f2fe; color: #0ea5e9;">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                                </path>
                            </svg>
                        </div>
                    </div>
                    <div class="stat-value">$45,231</div>
                    <div class="stat-label">Revenue</div>
                    <div class="stat-trend trend-up">↑ 8.2% vs last week</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: #fef3c7; color: #d97706;">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                        </div>
                    </div>
                    <div class="stat-value">58.4%</div>
                    <div class="stat-label">Active Sessions</div>
                    <div class="stat-trend trend-down">↓ 2.1% bounce rate</div>
                </div>
            </div>

            <!-- Chart -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">User Growth</div>
                    <select style="padding: 0.5rem; border-radius: 0.5rem; border: 1px solid var(--border);">
                        <option>Last 7 Days</option>
                        <option>Last 30 Days</option>
                    </select>
                </div>
                <div class="card-body">
                    <div class="chart-container" id="chartContainer">
                        <div class="chart-tooltip" id="tooltip"></div>
                        <!-- SVG Chart will be injected here -->
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Recent Users</div>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="userTable">
                            <!-- Rows injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Interactions ---

        // Toggle Sidebar
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 &&
                !sidebar.contains(e.target) &&
                !menuToggle.contains(e.target)) {
                sidebar.classList.remove('active');
            }
        });

        // User Dropdown
        const userMenu = document.getElementById('userMenu');
        const dropdown = document.getElementById('dropdown');
        userMenu.addEventListener('click', () => {
            dropdown.classList.toggle('show');
        });

        // Chart Implementation
        const chartData = [20, 45, 30, 60, 55, 80, 70, 95];
        const chartContainer = document.getElementById('chartContainer');
        const tooltip = document.getElementById('tooltip');

        function drawChart() {
            const width = chartContainer.offsetWidth;
            const height = chartContainer.offsetHeight;
            const padding = 20;
            const maxVal = Math.max(...chartData);

            // Calculate points
            const points = chartData.map((val, i) => {
                const x = (i / (chartData.length - 1)) * (width - 2 * padding) + padding;
                const y = height - ((val / maxVal) * (height - 2 * padding)) - padding;
                return { x, y, val };
            });

            // Create Path
            const pathD = points.map((p, i) =>
                (i === 0 ? 'M' : 'L') + `${p.x},${p.y}`
            ).join(' ');

            // Create Area (closed path)
            const areaD = pathD + ` L${width - padding},${height} L${padding},${height} Z`;

            // SVG Template
            const svgContent = `
                <svg viewBox="0 0 ${width} ${height}">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:var(--primary); stop-opacity:0.2" />
                            <stop offset="100%" style="stop-color:var(--primary); stop-opacity:0" />
                        </linearGradient>
                    </defs>
                    
                    <!-- Area Fill -->
                    <path d="${areaD}" fill="url(#gradient)" />
                    
                    <!-- Stroke Line -->
                    <path d="${pathD}" class="chart-line" />
                    
                    <!-- Dots -->
                    ${points.map((p, i) => `
                        <circle cx="${p.x}" cy="${p.y}" class="chart-dot" 
                                data-val="${p.val}"
                                onmouseover="showTooltip(evt, ${p.val})" 
                                onmouseout="hideTooltip()" />
                    `).join('')}
                </svg>
            `;

            chartContainer.innerHTML = svgContent + '<div class="chart-tooltip" id="tooltip"></div>';
            // Re-select tooltip after overwrite
            window.tooltip = document.getElementById('tooltip');
        }

        // Tooltip logic
        window.showTooltip = (evt, val) => {
            const tooltip = document.getElementById('tooltip');
            tooltip.textContent = `Users: ${val}`;
            tooltip.style.left = `${evt.offsetX - 20}px`;
            tooltip.style.top = `${evt.offsetY - 40}px`;
            tooltip.style.opacity = '1';
        };

        window.hideTooltip = () => {
            document.getElementById('tooltip').style.opacity = '0';
        };

        // Table Data Population
        const users = [
            { name: "Sarah Johnson", role: "Admin", status: "active", date: "Oct 24, 2025" },
            { name: "Michael Chen", role: "Editor", status: "pending", date: "Oct 22, 2025" },
            { name: "Emily Davis", role: "Viewer", status: "active", date: "Oct 20, 2025" },
            { name: "James Wilson", role: "Editor", status: "active", date: "Oct 18, 2025" }
        ];

        const tbody = document.getElementById('userTable');
        users.forEach(user => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight: 500;">${user.name}</td>
                <td>${user.role}</td>
                <td><span class="badge ${user.status === 'active' ? 'badge-active' : 'badge-pending'}">${user.status}</span></td>
                <td style="color: var(--text-sub);">${user.date}</td>
            `;
            tbody.appendChild(tr);
        });

        // Initial Draw
        drawChart();

        // Redraw on resize
        window.addEventListener('resize', () => {
            drawChart();
        });

    </script>
</body>

</html>

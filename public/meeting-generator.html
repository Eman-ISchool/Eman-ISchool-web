< !DOCTYPE html >
    <html lang="en" dir="rtl">
        <head>
            <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Meeting Generator | Eman ISchool</title>
                    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
                        <style>
                            :root {
                                --primary: #FFD700; /* Yellow/Gold from brand */
                            --primary-hover: #FDB931;
                            --dark: #1a1a1a;
                            --light: #ffffff;
                            --gray: #f5f5f5;
                            --text: #333;
                            --success: #10B981;
        }

                            * {
                                box - sizing: border-box;
                            margin: 0;
                            padding: 0;
                            font-family: 'Cairo', sans-serif;
        }

                            body {
                                background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
                            height: 100vh;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            overflow: hidden;
        }

                            .container {
                                background: rgba(255, 255, 255, 0.95);
                            padding: 3rem;
                            border-radius: 24px;
                            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
                            width: 100%;
                            max-width: 500px;
                            text-align: center;
                            backdrop-filter: blur(10px);
                            transform: translateY(20px);
                            opacity: 0;
                            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

                            @keyframes slideUp {
                                to {
                                transform: translateY(0);
                            opacity: 1;
            }
        }

                            h1 {
                                color: var(--dark);
                            font-size: 2rem;
                            margin-bottom: 0.5rem;
        }

                            p.subtitle {
                                color: #666;
                            margin-bottom: 2.5rem;
        }

                            .action-area {
                                min - height: 120px;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            justify-content: center;
        }

                            .btn {
                                background: var(--dark);
                            color: var(--primary);
                            border: none;
                            padding: 16px 32px;
                            font-size: 1.1rem;
                            font-weight: 700;
                            border-radius: 50px;
                            cursor: pointer;
                            transition: all 0.3s ease;
                            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                            display: flex;
                            align-items: center;
                            gap: 10px;
        }

                            .btn:hover {
                                transform: translateY(-2px);
                            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
                            background: black;
        }

                            .btn:active {
                                transform: translateY(1px);
        }

                            .result-card {
                                background: var(--gray);
                            padding: 1.5rem;
                            border-radius: 16px;
                            width: 100%;
                            display: none; /* Hidden by default */
                            opacity: 0;
                            transform: scale(0.9);
                            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

                            .result-card.show {
                                display: block;
                            opacity: 1;
                            transform: scale(1);
        }

                            .link-display {
                                background: white;
                            border: 2px solid #e0e0e0;
                            padding: 12px 16px;
                            border-radius: 12px;
                            color: #555;
                            font-family: monospace;
                            font-size: 1.1rem;
                            margin-bottom: 1rem;
                            word-break: break-all;
                            direction: ltr; /* Ensure link displays LTR */
        }

                            .copy-btn {
                                width: 100%;
                            background: transparent;
                            border: 2px solid var(--dark);
                            color: var(--dark);
                            padding: 12px;
                            border-radius: 12px;
                            font-weight: 600;
                            cursor: pointer;
                            transition: all 0.2s;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            gap: 8px;
        }

                            .copy-btn:hover {
                                background: var(--dark);
                            color: white;
        }

                            .toast {
                                position: fixed;
                            bottom: 30px;
                            left: 50%;
                            transform: translateX(-50%) translateY(100px);
                            background: var(--success);
                            color: white;
                            padding: 12px 24px;
                            border-radius: 50px;
                            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
                            font-weight: 600;
                            display: flex;
                            align-items: center;
                            gap: 8px;
                            opacity: 0;
                            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
                            z-index: 100;
        }

                            .toast.visible {
                                transform: translateX(-50%) translateY(0);
                            opacity: 1;
        }

                            /* Loading spinner */
                            .spinner {
                                width: 24px;
                            height: 24px;
                            border: 3px solid rgba(255,215,0, 0.3);
                            border-radius: 50%;
                            border-top-color: var(--primary);
                            animation: spin 1s ease-in-out infinite;
                            display: none;
        }

                            @keyframes spin {
                                to {transform: rotate(360deg); }
        }

                            /* Icons */
                            .icon {
                                width: 24px;
                            height: 24px;
                            fill: none;
                            stroke: currentColor;
                            stroke-width: 2;
                            stroke-linecap: round;
                            stroke-linejoin: round;
        }
                        </style>
                    </head>
                    <body>

                        <div class="container">
                            <h1>اجتماع جديد</h1>
                            <p class="subtitle">أنشئ رابط اجتماع فوري وشاركه مع طلابك</p>

                            <div class="action-area" id="actionArea">
                                <button class="btn" id="createBtn" onclick="createMeeting()">
                                    <span class="spinner" id="spinner"></span>
                                    <span id="btnText">إنشاء اجتماع</span>
                                    <svg class="icon" id="plusIcon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                </button>

                                <div class="result-card" id="resultCard">
                                    <div class="link-display" id="linkText"></div>
                                    <button class="copy-btn" id="copyBtn" onclick="copyLink()">
                                        <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                        نسخ الرابط
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="toast" id="toast">
                            <svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            تم النسخ للحافظة!
                        </div>

                        <script>
                            function createMeeting() {
            const btn = document.getElementById('createBtn');
                            const spinner = document.getElementById('spinner');
                            const btnText = document.getElementById('btnText');
                            const plusIcon = document.getElementById('plusIcon');
                            const resultCard = document.getElementById('resultCard');

                            // Simulating API call/Generation
                            btn.style.width = '60px'; // Shrink to circle
                            btn.style.padding = '0';
                            btnText.style.display = 'none';
                            plusIcon.style.display = 'none';
                            spinner.style.display = 'block';

                            // Reset previous state if any
                            resultCard.classList.remove('show');
            
            setTimeout(() => {
                // Generate random ID
                const randomId = Math.random().toString(36).substring(2, 5) + '-' +
                            Math.random().toString(36).substring(2, 6) + '-' +
                            Math.random().toString(36).substring(2, 5);

                            const link = `https://meet.google.com/${randomId}`;

                            document.getElementById('linkText').innerText = link;

                            // Animate transition
                            btn.style.display = 'none'; // Hide button
                            resultCard.classList.add('show');
                
            }, 1200);
        }

                            function copyLink() {
            const linkText = document.getElementById('linkText').innerText;
            
            navigator.clipboard.writeText(linkText).then(() => {
                                showToast();

                            const copyBtn = document.getElementById('copyBtn');
                            const originalContent = copyBtn.innerHTML;

                            copyBtn.innerHTML = '<svg class="icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg> تم النسخ';
                            copyBtn.style.background = '#10B981';
                            copyBtn.style.color = 'white';
                            copyBtn.style.borderColor = '#10B981';
                
                setTimeout(() => {
                                copyBtn.innerHTML = originalContent;
                            copyBtn.style.background = 'transparent';
                            copyBtn.style.color = 'var(--dark)';
                            copyBtn.style.borderColor = 'var(--dark)';
                }, 2000);
            });
        }

                            function showToast() {
            const toast = document.getElementById('toast');
                            toast.classList.add('visible');
            setTimeout(() => {
                                toast.classList.remove('visible');
            }, 3000);
        }
                        </script>
                    </body>
                </html>

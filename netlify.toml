[build]
  command = "yarn build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # Prevent Capacitor static-export flag from leaking into Netlify builds
  NEXT_OUTPUT = ""
  NEXT_DIST_DIR = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Long-lived cache for static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
